version: "3.9"

# Development Docker Compose
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: kanban_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kanban_db}
      POSTGRES_USER: ${POSTGRES_USER:-kanban_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_in_prod}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanban_user} -d ${POSTGRES_DB:-kanban_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kanban_network

  redis:
    image: redis:7-alpine
    container_name: kanban_redis_dev
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-dev_redis_password}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-dev_redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kanban_network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: kanban_api_dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-kanban_user}:${POSTGRES_PASSWORD:-dev_password_change_in_prod}@postgres:5432/${POSTGRES_DB:-kanban_db}
      REDIS_URL: redis://:${REDIS_PASSWORD:-dev_redis_password}@redis:6379
    env_file:
      - .env
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - ./packages/shared:/packages/shared
    networks:
      - kanban_network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: kanban_web_dev
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:${API_PORT:-4000}
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    networks:
      - kanban_network

volumes:
  postgres_data:
  redis_data:

networks:
  kanban_network:
    driver: bridge
