version: "3.9"

# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d
# IMPORTANT: Set all env vars in .env before running

services:
  postgres:
    image: postgres:16-alpine
    container_name: kanban_postgres_prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./.docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kanban_internal

  redis:
    image: redis:7-alpine
    container_name: kanban_redis_prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kanban_internal

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: kanban_api_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    env_file:
      - .env
    expose:
      - "4000"
    networks:
      - kanban_internal
    user: "node"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    container_name: kanban_web_prod
    restart: always
    depends_on:
      - api
    expose:
      - "80"
    networks:
      - kanban_internal
    user: "nginx"
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27-alpine
    container_name: kanban_nginx_prod
    restart: always
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./.docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./.docker/nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - kanban_internal
      - kanban_external
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  redis_data:
  nginx_logs:

networks:
  kanban_internal:
    driver: bridge
    internal: true
  kanban_external:
    driver: bridge
